<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="50%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer premium diamond shield -->
  <path d="M50 5 L90 35 V75 L50 95 L10 75 V35 L50 5 Z" stroke="url(#goldGrad)" stroke-width="2.5" fill="rgba(255, 179, 0, 0.03)" filter="url(#glow)" />
  <!-- Stylized letter 'A' and Calculator Grid integration -->
  <path d="M50 25 L72 70 H60 L50 48 L40 70 H28 L50 25 Z" fill="url(#goldGrad)" />
  <!-- Crossbar of A made of calculator dot matrix -->
  <circle cx="44" cy="58" r="2.5" fill="#0B0B0B" />
  <circle cx="50" cy="58" r="2.5" fill="#0B0B0B" />
  <circle cx="56" cy="58" r="2.5" fill="#0B0B0B" />
</svg>
